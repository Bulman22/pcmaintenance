name: Deploy

# Build image, push to Docker Hub (bulman22/pcmaintenance-web), then migrate + deploy on runner with label deployment.
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN. Connection string hardcodat.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t bulman22/pcmaintenance-web:latest .
          docker push bulman22/pcmaintenance-web:latest

  migrate:
    needs: build-push
    runs-on: [self-hosted, deployment]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-ef
        run: dotnet tool install -g dotnet-ef

      - name: Apply migrations
        env:
          CONNECTION_STRING: "Host=192.168.0.101;Port=5432;Username=postgres;Password=5wagyolo;Database=postgres"
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update --project PcMaintenance.Server --connection "$CONNECTION_STRING"

  deploy:
    needs: migrate
    runs-on: [self-hosted, deployment]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy (pull and up)
        env:
          CONNECTION_STRING: "Host=192.168.0.101;Port=5432;Username=postgres;Password=5wagyolo;Database=postgres"
        run: |
          docker compose down
          docker compose pull
          docker compose up -d
          docker image prune -f
