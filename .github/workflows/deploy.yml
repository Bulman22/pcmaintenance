name: Deploy

# Build on self-hosted, deploy on runner with label deployment.
# Migrațiile se aplică la pornirea containerului (Program.cs Database.Migrate()).
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, DB_CONNECTION_STRING (Host=...;Password=...;...).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pcmaintenance.client/package-lock.json

      - name: Restore .NET
        run: dotnet restore PcMaintenance.Server

      - name: Build frontend
        run: |
          cd pcmaintenance.client
          npm ci
          npm run build

      - name: Build backend
        run: dotnet build PcMaintenance.Server --no-restore -c Release

      - name: Lint frontend
        run: |
          cd pcmaintenance.client
          npm run lint

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t bulman22/pcmaintenance-web:latest .
          docker push bulman22/pcmaintenance-web:latest

  deploy:
    needs: build
    runs-on: deployment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create .env for Compose
        run: |
          printf 'CONNECTION_STRING=%s\n' '${{ secrets.DB_CONNECTION_STRING }}' > .env

      - name: Deploy (pull and up)
        run: |
          docker compose down
          docker compose pull
          docker compose up -d
          docker image prune -f
