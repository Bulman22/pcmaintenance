name: Deploy

# Build image, push to Docker Hub, then deploy on runner with label deployment.
# Migrațiile se aplică la pornirea containerului (Program.cs Database.Migrate()) – runner-ul nu are acces la DB.
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, DB_CONNECTION_STRING (Host=...;Password=parola_reala;...).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t bulman22/pcmaintenance-web:latest .
          docker push bulman22/pcmaintenance-web:latest

  deploy:
    needs: build-push
    runs-on: deployment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create .env for Compose
        run: |
          printf 'CONNECTION_STRING=%s\n' '${{ secrets.DB_CONNECTION_STRING }}' > .env

      - name: Deploy (pull and up)
        run: |
          docker compose down
          docker compose pull
          docker compose up -d
          docker image prune -f
