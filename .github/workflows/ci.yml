name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pcmaintenance.client/package-lock.json

      - name: Restore .NET
        run: dotnet restore PcMaintenance.Server

      - name: Build frontend
        run: |
          cd pcmaintenance.client
          npm ci
          npm run build

      - name: Build backend
        run: dotnet build PcMaintenance.Server --no-restore -c Release

      - name: Run .NET tests
        run: dotnet test PcMaintenance.Server.Tests -c Release

      - name: Lint frontend
        run: |
          cd pcmaintenance.client
          npm run lint
